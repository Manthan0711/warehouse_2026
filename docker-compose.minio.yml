services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - ./minio_data:/data
    command: server /data --console-address ":9001"

  presign:
    image: node:20
    container_name: minio-presign
    working_dir: /app
    volumes:
      - ./tools/minio-presign-server:/app
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET_IMAGES: warehouse-images
      MINIO_BUCKET_DOCS: warehouse-documents
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
    # install dependencies on container start and then run the server
    command: sh -c "npm install --no-audit --no-fund && node index.js"
    depends_on:
      - minio
    ports:
      - "3001:3001"
